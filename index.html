<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projekt-Scheduler</title>
<style>
  :root {
    --bg: #0f1117; --bg2: #181b24; --bg3: #1e222e;
    --border: #2a2f3e; --text: #e2e4ea; --text2: #8b90a0;
    --accent: #4e9af5; --accent2: #3b7dd8;
    --green: #34d399; --orange: #f59e0b; --red: #ef4444;
    --radius: 6px;
    --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Menlo, Consolas, 'Liberation Mono', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Roboto, 'Helvetica Neue', Arial, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--sans); background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5; }
  .app { max-width:1440px; margin:0 auto; padding:24px; }

  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; padding-bottom:20px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:12px; }
  header h1 { font-family:var(--mono); font-size:20px; font-weight:700; letter-spacing:-0.5px; }
  header h1 span { color:var(--accent); }
  .header-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .save-indicator { font-family:var(--mono); font-size:11px; color:var(--text2); display:flex; align-items:center; gap:6px; }
  .save-dot { width:6px; height:6px; border-radius:50%; background:var(--green); transition:background .3s; }
  .save-dot.saving { background:var(--orange); }
  .header-link { font-family:var(--mono); font-size:11px; color:var(--text2); text-decoration:none; display:flex; align-items:center; gap:6px; padding:6px 12px; border:1px solid var(--border); border-radius:var(--radius); transition:all .2s; }
  .header-link:hover { color:var(--text); border-color:var(--text2); background:var(--bg3); }
  .header-link.paypal-link:hover { color:#0070ba; border-color:#0070ba; }
  .lang-toggle { font-family:var(--mono); font-size:11px; font-weight:600; display:flex; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  .lang-toggle button { padding:5px 10px; border:none; background:var(--bg2); color:var(--text2); cursor:pointer; font:inherit; transition:all .15s; }
  .lang-toggle button:not(:last-child) { border-right:1px solid var(--border); }
  .lang-toggle button.active { background:var(--accent); color:#fff; }
  .lang-toggle button:hover:not(.active) { color:var(--text); background:var(--bg3); }

  .toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; align-items:center; }
  .btn { font-family:var(--mono); font-size:12px; font-weight:500; padding:8px 16px; border:1px solid var(--border); border-radius:var(--radius); background:var(--bg2); color:var(--text); cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:6px; white-space:nowrap; }
  .btn:hover { border-color:var(--accent); color:var(--accent); }
  .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn.primary:hover { background:var(--accent2); }
  .btn.danger { border-color:var(--red); color:var(--red); }
  .btn.danger:hover { background:var(--red); color:#fff; }

  .strategy-toggle { display:flex; gap:0; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  .strategy-toggle .btn { border:none; border-radius:0; margin:0; font-size:11px; padding:8px 14px; color:var(--text2); }
  .strategy-toggle .btn:not(:last-child) { border-right:1px solid var(--border); }
  .strategy-toggle .btn:hover { color:var(--text); background:var(--bg3); border-color:transparent; }
  .strategy-toggle .btn.active { background:var(--accent); color:#fff; }

  .panels { display:grid; grid-template-columns:1fr; gap:24px; }
  .panel { background:var(--bg2); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  .panel-header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); background:var(--bg3); flex-wrap:wrap; gap:8px; }
  .panel-header h2 { font-family:var(--mono); font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text2); }
  .panel-body { padding:18px; }

  .capacity-grid { display:flex; flex-wrap:wrap; gap:12px; align-items:stretch; }
  .cap-card { display:flex; align-items:center; gap:8px; padding:10px 14px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); flex:0 1 320px; position:relative; min-width:240px; }
  .cap-badge { font-family:var(--mono); font-size:11px; font-weight:700; width:32px; height:32px; border-radius:6px; display:flex; align-items:center; justify-content:center; color:#fff; flex-shrink:0; cursor:pointer; }
  .cap-name-input { flex:1; font-family:var(--sans); font-size:13px; font-weight:600; padding:4px 8px; border:1px solid transparent; border-radius:4px; background:transparent; color:var(--text); min-width:0; }
  .cap-name-input:focus { outline:none; border-color:var(--accent); background:var(--bg); }
  .cap-num-input { width:56px; font-family:var(--mono); font-size:13px; padding:4px 6px; border:1px solid var(--border); border-radius:4px; background:var(--bg2); color:var(--text); text-align:right; }
  .cap-num-input:focus { outline:none; border-color:var(--accent); }
  .cap-unit { font-family:var(--mono); font-size:11px; color:var(--text2); }
  .cap-del { width:22px; height:22px; border:none; background:none; color:var(--text2); cursor:pointer; border-radius:4px; font-size:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .cap-del:hover { background:var(--red); color:#fff; }
  .cap-add { display:flex; align-items:center; justify-content:center; min-width:100px; flex:0 0 auto; padding:10px 20px; background:var(--bg); border:2px dashed var(--border); border-radius:var(--radius); cursor:pointer; font-family:var(--mono); font-size:12px; color:var(--text2); transition:all .15s; }
  .cap-add:hover { border-color:var(--accent); color:var(--accent); }

  .settings-row { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .settings-row label { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:6px; }
  .settings-row select, .settings-row input[type="number"] { font-family:var(--mono); font-size:12px; padding:4px 8px; border:1px solid var(--border); border-radius:4px; background:var(--bg); color:var(--text); }
  .settings-row select:focus, .settings-row input:focus { outline:none; border-color:var(--accent); }

  .table-wrap { overflow-x:auto; margin:0 -18px; padding:0 18px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { font-family:var(--mono); font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--text2); text-align:left; padding:10px 12px; border-bottom:2px solid var(--border); white-space:nowrap; position:sticky; top:0; background:var(--bg2); }
  tbody td { padding:8px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
  tbody tr:hover { background:var(--bg3); }
  td input { font-family:var(--mono); font-size:13px; padding:4px 8px; border:1px solid transparent; border-radius:4px; background:transparent; color:var(--text); width:100%; }
  td input:hover { border-color:var(--border); }
  td input:focus { outline:none; border-color:var(--accent); background:var(--bg); }
  td input[type="number"] { width:70px; text-align:right; }
  .row-del { width:28px; height:28px; border:none; background:none; color:var(--text2); cursor:pointer; border-radius:4px; font-size:16px; display:flex; align-items:center; justify-content:center; }
  .row-del:hover { background:var(--red); color:#fff; }

  .ms-lock { width:28px; height:28px; border:none; background:none; cursor:pointer; border-radius:4px; font-size:14px; display:flex; align-items:center; justify-content:center; transition:all .15s; }
  .ms-lock.locked { color:var(--orange); }
  .ms-lock.unlocked { color:var(--green); }
  .ms-lock:hover { background:var(--bg3); }
  .ms-lock.first { color:var(--border); cursor:default; }

  .gantt-container { overflow-x:auto; padding-bottom:12px; }
  .gantt { min-width:800px; }
  .gantt-header { display:flex; border-bottom:2px solid var(--border); margin-left:220px; }
  .gantt-month { flex:0 0 80px; font-family:var(--mono); font-size:11px; font-weight:600; color:var(--text2); text-align:center; padding:8px 0; border-left:1px solid var(--border); }
  .gantt-row { display:flex; align-items:center; min-height:36px; border-bottom:1px solid var(--border); }
  .gantt-label { flex:0 0 220px; font-size:12px; padding:4px 12px; display:flex; align-items:center; gap:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .gantt-label .proj-tag { font-family:var(--mono); font-size:10px; font-weight:700; padding:2px 6px; border-radius:3px; background:var(--bg3); color:var(--text2); border:1px solid var(--border); flex-shrink:0; }
  .gantt-bars { flex:1; display:flex; min-height:28px; position:relative; }
  .gantt-cell { flex:0 0 80px; border-left:1px solid var(--border); min-height:28px; }
  .gantt-bar { position:absolute; top:4px; height:20px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:10px; font-weight:600; color:#fff; z-index:2; box-shadow:0 1px 3px rgba(0,0,0,.3); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding:0 6px; }

  .capacity-overview { margin-top:24px; min-width:800px; }
  .cap-row { display:flex; align-items:center; margin-bottom:6px; }
  .cap-row-label { flex:0 0 220px; font-family:var(--mono); font-size:11px; font-weight:600; padding:0 12px; display:flex; align-items:center; gap:6px; }
  .cap-cells { display:flex; flex:1; }
  .cap-cell { flex:0 0 80px; border-left:1px solid var(--border); padding:2px 4px; height:24px; }
  .cap-fill { height:100%; border-radius:2px; transition:width .3s; position:relative; }
  .cap-pct { font-family:var(--mono); font-size:9px; font-weight:600; color:#fff; position:absolute; right:4px; top:50%; transform:translateY(-50%); text-shadow:0 1px 2px rgba(0,0,0,.5); }

  .warning-list { list-style:none; padding:0; }
  .warning-list li { font-size:12px; padding:6px 10px; margin-bottom:4px; border-radius:4px; display:flex; align-items:center; gap:8px; }
  .warning-list li.over { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:var(--red); }
  .warning-list li.ok { background:rgba(52,211,153,.1); border:1px solid rgba(52,211,153,.3); color:var(--green); }
  .warning-list li.info { background:rgba(78,154,245,.1); border:1px solid rgba(78,154,245,.3); color:var(--accent); }

  .empty-state { text-align:center; padding:48px 24px; color:var(--text2); font-size:14px; }
  .empty-state code { font-family:var(--mono); background:var(--bg); padding:2px 6px; border-radius:3px; font-size:12px; }

  input[type="file"] { display:none; }
  .toast { position:fixed; bottom:24px; right:24px; background:var(--bg3); border:1px solid var(--border); padding:10px 18px; border-radius:var(--radius); font-family:var(--mono); font-size:12px; color:var(--green); opacity:0; transform:translateY(10px); transition:all .3s; z-index:100; pointer-events:none; }
  .toast.show { opacity:1; transform:translateY(0); }

  .app-footer { margin-top:32px; padding:16px 0; border-top:1px solid var(--border); text-align:center; font-family:var(--mono); font-size:11px; color:var(--text2); line-height:1.6; }
  .footer-links { margin-top:8px; display:flex; justify-content:center; gap:16px; }
  .footer-links a { color:var(--text2); text-decoration:none; font-family:var(--mono); font-size:11px; cursor:pointer; transition:color .15s; }
  .footer-links a:hover { color:var(--accent); }

  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--bg2); border:1px solid var(--border); border-radius:10px; max-width:680px; width:90vw; max-height:80vh; overflow-y:auto; padding:32px; position:relative; }
  .modal h2 { font-family:var(--mono); font-size:16px; font-weight:700; margin-bottom:16px; color:var(--text); }
  .modal h3 { font-family:var(--mono); font-size:13px; font-weight:600; margin:20px 0 8px; color:var(--accent); }
  .modal p, .modal li { font-size:13px; line-height:1.7; color:var(--text2); margin-bottom:8px; }
  .modal ul { padding-left:20px; }
  .modal a { color:var(--accent); }
  .modal-close { position:sticky; top:0; float:right; width:32px; height:32px; border:none; background:var(--bg3); color:var(--text2); border-radius:6px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:1; }
  .modal-close:hover { background:var(--red); color:#fff; }
  .placeholder { background:var(--bg); border:1px dashed var(--orange); border-radius:4px; padding:8px 12px; font-family:var(--mono); font-size:12px; color:var(--orange); margin:8px 0; }

  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--text2); }

  @media (max-width:768px) { .app { padding:12px; } header { flex-direction:column; align-items:flex-start; } .toolbar { gap:4px; } .btn { padding:6px 10px; font-size:11px; } }
</style>
</head>
<body>
<div class="app">
  <div id="appHeader"></div>
  <div id="appToolbar"></div>
  <div class="panels">
    <div class="panel">
      <div class="panel-header">
        <h2 id="panelCapTitle"></h2>
        <div class="settings-row">
          <label><span id="lblStart"></span><select id="startMonth"></select></label>
          <label><span id="lblYear"></span><input type="number" id="startYear" value="2026" style="width:70px"></label>
        </div>
      </div>
      <div class="panel-body"><div class="capacity-grid" id="capacityGrid"></div></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <h2 id="panelDataTitle"></h2>
        <span style="font-size:11px;color:var(--text2);font-family:var(--mono)" id="rowCount"></span>
      </div>
      <div class="panel-body">
        <div class="table-wrap">
          <table><thead><tr id="tableHead"></tr></thead><tbody id="dataBody"></tbody></table>
          <div class="empty-state" id="emptyState"></div>
        </div>
      </div>
    </div>
    <div class="panel" id="ganttPanel" style="display:none">
      <div class="panel-header">
        <h2 id="panelGanttTitle"></h2>
        <span style="font-size:11px;color:var(--text2);font-family:var(--mono)" id="schedInfo"></span>
      </div>
      <div class="panel-body">
        <div class="gantt-container"><div class="gantt" id="ganttChart"></div><div class="capacity-overview" id="capOverview"></div></div>
      </div>
    </div>
    <div class="panel" id="warnPanel" style="display:none">
      <div class="panel-header"><h2 id="panelAnalysisTitle"></h2></div>
      <div class="panel-body"><ul class="warning-list" id="warnings"></ul></div>
    </div>
  </div>
  <footer id="appFooter"></footer>
</div>

<div class="modal-overlay" id="modalImpressum" onclick="if(event.target===this)closeModal('modalImpressum')">
  <div class="modal" id="modalImpressumContent"></div>
</div>
<div class="modal-overlay" id="modalDatenschutz" onclick="if(event.target===this)closeModal('modalDatenschutz')">
  <div class="modal" id="modalDatenschutzContent"></div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="csvInput" accept=".csv" onchange="importCSV(event)">

let _nextId = 4;
function newId() {
  const existing = new Set(state.teams.map(t => t.id));
  while (existing.has('t' + _nextId)) _nextId++;
  return 't' + (_nextId++);
}

let state = {
  teams: [
    { id:'t1', name:'Team A', capacity:20, color:PALETTE[0] },
    { id:'t2', name:'Team B', capacity:20, color:PALETTE[1] },
    { id:'t3', name:'Team C', capacity:20, color:PALETTE[2] },
  ],
  rows: [],
  startMonth: 0,
  startYear: 2026,
  strategy: 'parallel',
  msStart: null,
  msEnd: null,
  usedCapacity: null,
  lang: 'de',
  _nextId: 4
};

function L(k) { return i18n[state.lang][k]; }
function esc(s) { return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ═══════════════════════════════════════════════════════
let storageOk = false;
try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); storageOk = true; } catch(e) {}

function saveState() {
  if (!storageOk) return;
  try {
    state._nextId = _nextId;
    const dot = document.getElementById('saveDot');
    const st  = document.getElementById('saveStatus');
    dot.classList.add('saving'); st.textContent = L('saving');
    localStorage.setItem('scheduler_v3', JSON.stringify(state));
    setTimeout(() => {
      dot.classList.remove('saving');
      st.textContent = L('saved')+' '+new Date().toLocaleTimeString(state.lang==='de'?'de-DE':'en-US');
    }, 300);
  } catch(e) {}
}

function loadState() {
  if (!storageOk) return false;
  try {
    const d = localStorage.getItem('scheduler_v3');
    if (d) { state = { ...state, ...JSON.parse(d) }; _nextId = state._nextId || 4; return true; }
  } catch(e) {}
  return false;
}

setInterval(saveState, 5000);

function addTeam() {
  const id = newId();
  state.teams.push({ id, name:'Team '+state.teams.length, capacity:20, color:PALETTE[state.teams.length%PALETTE.length] });
  state.rows.forEach(r => { r.efforts[id] = 0; });
  state.msStart = null;
  renderCapacity(); renderTableHeaders(); renderTable(); hideSchedule();
}

function removeTeam(id) {
  if (state.teams.length <= 1) { toast(L('toastMinTeam')); return; }
  state.teams = state.teams.filter(t => t.id !== id);
  state.rows.forEach(r => { delete r.efforts[id]; });
  state.msStart = null;
  renderCapacity(); renderTableHeaders(); renderTable(); hideSchedule();
}

function updateTeam(id, prop, val) {
  const team = state.teams.find(t => t.id === id);
  if (!team) return;
  team[prop] = val;
  renderTableHeaders();
  if (state.msStart) renderGantt();
}

function cycleColor(id) {
  const team = state.teams.find(t => t.id === id);
  if (!team) return;
  team.color = PALETTE[(PALETTE.indexOf(team.color) + 1) % PALETTE.length];
  renderCapacity();
  if (state.msStart) renderGantt();
}

function hideSchedule() {
  document.getElementById('ganttPanel').style.display = 'none';
  document.getElementById('warnPanel').style.display = 'none';
}

function renderTable() {
  const body = document.getElementById('dataBody');
  const empty = document.getElementById('emptyState');
  body.innerHTML = '';
  if (state.rows.length === 0) {
    empty.style.display = ''; empty.innerHTML = L('emptyState');
    document.getElementById('rowCount').textContent = L('entries')(0); return;
  }
  empty.style.display = 'none';
  document.getElementById('rowCount').textContent = L('entries')(state.rows.length);

  // Detect first milestone per project
  const seenProjects = new Set();

  state.rows.forEach((row, i) => {
    // Ensure canOverlap exists (migration from old data)
    if (row.canOverlap === undefined) row.canOverlap = true;

    const isFirst = !seenProjects.has(row.project);
    if (row.project) seenProjects.add(row.project);

    const tr = document.createElement('tr');
    let html = `<td><input type="text" value="${esc(row.project)}" oninput="state.rows[${i}].project=this.value" placeholder="${L('phProject')}"></td>
      <td><input type="text" value="${esc(row.milestone)}" oninput="state.rows[${i}].milestone=this.value" placeholder="${L('phMilestone')}"></td>`;
    state.teams.forEach(team => {
      html += `<td><input type="number" min="0" value="${row.efforts[team.id]||0}" oninput="state.rows[${i}].efforts['${team.id}']=parseFloat(this.value)||0"></td>`;
    });
    // Lock column
    if (isFirst) {
      html += `<td><button class="ms-lock first" title="—" disabled>—</button></td>`;
    } else {
      const locked = !row.canOverlap;
      html += `<td><button class="ms-lock ${locked?'locked':'unlocked'}" onclick="toggleRowOverlap(${i})" title="${locked ? L('waitTip') : L('overlapTip')}">${locked?'🔒':'🔓'}</button></td>`;
    }
    html += `<td><button class="row-del" onclick="deleteRow(${i})">×</button></td>`;
    tr.innerHTML = html; body.appendChild(tr);
  });
}

function toggleRowOverlap(i) {
  state.rows[i].canOverlap = !state.rows[i].canOverlap;
  renderTable();
  if (state.msStart) runScheduler();
}

function addRow() {
  const efforts = {}; state.teams.forEach(t => { efforts[t.id] = 0; });
  state.rows.push({ project:'', milestone:'', efforts, canOverlap: true }); renderTable();
}
function deleteRow(i) { state.rows.splice(i, 1); renderTable(); }

function importCSV(ev) {
  const file = ev.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = e => { parseCSV(e.target.result); renderCapacity(); renderTableHeaders(); renderTable(); toast(L('toastCSVLoaded')(state.rows.length)); };
  r.readAsText(file); ev.target.value = '';
}

function parseCSV(text) {
  const lines = text.trim().split('\n'); if (lines.length < 2) return;
  const sep = lines[0].includes(';') ? ';' : ',';
  const headers = lines[0].split(sep).map(h => h.trim().replace(/^"|"$/g,''));
  const teamCols = [];
  for (let c = 2; c < headers.length; c++) {
    const h = headers[c];
    if (/geplanter|planned|start|ende|end/i.test(h)) break;
    const name = h.replace(/\s*\(P[TD]\)\s*$/i, '').trim();
    if (name) teamCols.push({ colIdx: c, name });
  }
  if (teamCols.length > 0) {
    state.teams = teamCols.map((tc, i) => ({ id:'t'+(i+1), name:tc.name, capacity:20, color:PALETTE[i%PALETTE.length] }));
    _nextId = teamCols.length + 1;
  }
  state.rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(sep).map(c => c.trim().replace(/^"|"$/g,''));
    if (cols.length < 3) continue;
    const efforts = {};
    state.teams.forEach((team, ti) => { efforts[team.id] = parseFloat(cols[teamCols[ti]?.colIdx]) || 0; });
    state.rows.push({ project: cols[0]||'', milestone: cols[1]||'', efforts, canOverlap: true });
  }
  state.msStart = null;
}

function exportCSV() {
  if (state.rows.length === 0) { toast(L('toastNoExport')); return; }
  const mo = L('months');
  let csv = `${L('csvProject')};${L('csvMilestone')}`;
  state.teams.forEach(t => { csv += `;${t.name} (PT)`; });
  if (state.msStart) csv += `;${L('csvStart')};${L('csvEnd')}`;
  csv += '\n';
  state.rows.forEach((r, i) => {
    let line = `${r.project};${r.milestone}`;
    state.teams.forEach(t => { line += `;${r.efforts[t.id]||0}`; });
    if (state.msStart) {
      const fmt = m => { const mi=(state.startMonth+m)%12; const yr=state.startYear+Math.floor((state.startMonth+m)/12); return `${mo[mi]} ${yr}`; };
      line += `;${fmt(state.msStart[i])};${fmt(state.msEnd[i])}`;
    }
    csv += line + '\n';
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='projektplan.csv'; a.click();
  URL.revokeObjectURL(url);
  toast(L('toastCSVExported'));
}

function syncRowsFromTable() {
  document.querySelectorAll('#dataBody tr').forEach((tr, i) => {
    const inp = tr.querySelectorAll('input');
    if (!state.rows[i]) return;
    state.rows[i].project = inp[0].value;
    state.rows[i].milestone = inp[1].value;
    state.teams.forEach((team, ti) => { state.rows[i].efforts[team.id] = parseFloat(inp[2+ti]?.value) || 0; });
  });
}

// ═══════════════════════════════════════════════════════
//  SCHEDULER — Multi-month simulation
// ═══════════════════════════════════════════════════════
function runScheduler() {
  if (state.rows.length === 0) { toast(L('toastNoData')); return; }
  syncRowsFromTable();

  const projects = {}, order = [];
  state.rows.forEach((r,i) => {
    if (!projects[r.project]) { projects[r.project]=[]; order.push(r.project); }
    projects[r.project].push({ ...r, idx:i });
  });

  const N = state.rows.length;
  const MAX = 48;

  // Remaining effort per milestone per team
  const rem = state.rows.map(r => {
    const o = {};
    state.teams.forEach(t => { o[t.id] = r.efforts[t.id] || 0; });
    return o;
  });

  const msStart = new Array(N).fill(-1);
  const msEnd   = new Array(N).fill(-1);
  const used    = {}; // month -> teamId -> PT

  function isMsDone(idx) {
    return state.teams.every(t => rem[idx][t.id] <= 0);
  }

  function allDone() {
    for (let i = 0; i < N; i++) if (!isMsDone(i)) return false;
    return true;
  }

  function ensureUsed(m) {
    if (!used[m]) { used[m] = {}; state.teams.forEach(t => { used[m][t.id] = 0; }); }
  }

  function allocate(month, idx, teamId, amount) {
    if (amount <= 0) return 0;
    const actual = Math.min(amount, rem[idx][teamId]);
    if (actual <= 0) return 0;
    rem[idx][teamId] -= actual;
    ensureUsed(month);
    used[month][teamId] += actual;
    if (msStart[idx] === -1) msStart[idx] = month;
    return actual;
  }

  // For a given team, find eligible milestones (max 1 per project)
  function getEligible(teamId) {
    const eligible = [];
    order.forEach(proj => {
      const milestones = projects[proj];
      for (let mi = 0; mi < milestones.length; mi++) {
        const idx = milestones[mi].idx;
        const row = state.rows[idx];
        const teamDone = rem[idx][teamId] <= 0;

        if (mi > 0) {
          const prevIdx = milestones[mi - 1].idx;
          if (row.canOverlap === false) {
            // Strict: previous milestone must be FULLY complete (all teams)
            if (!isMsDone(prevIdx)) {
              // Can't pass this milestone — check if team has work on prev
              if (rem[prevIdx][teamId] > 0) eligible.push(prevIdx);
              break;
            }
          } else {
            // Overlap allowed: team can pass if it's done with prev
            if (rem[prevIdx][teamId] > 0) { eligible.push(prevIdx); break; }
          }
        }

        if (!teamDone) { eligible.push(idx); break; }
        // Team done with this milestone, continue to next
      }
    });
    return eligible;
  }

  // ─── Month-by-month simulation ───
  for (let month = 0; month < MAX; month++) {
    if (allDone()) break;

    state.teams.forEach(team => {
      let cap = team.capacity;
      if (cap <= 0) return;

      if (state.strategy === 'speed') {
        // Speed: all capacity to highest-priority eligible, spillover to next
        // Re-evaluate after each milestone completes within the month
        let safety = 0;
        while (cap > 0.001 && safety++ < 50) {
          const eligible = getEligible(team.id);
          if (eligible.length === 0) break;
          const idx = eligible[0]; // highest priority
          const spent = allocate(month, idx, team.id, cap);
          cap -= spent;
          if (spent === 0) break;
        }
      } else {
        // Parallel: distribute capacity proportionally across eligible milestones
        const eligible = getEligible(team.id);
        if (eligible.length === 0) return;
        const totalNeed = eligible.reduce((s, idx) => s + rem[idx][team.id], 0);
        if (totalNeed <= 0) return;
        const availCap = Math.min(cap, totalNeed);

        let allocated = 0;
        eligible.forEach((idx, ei) => {
          const need = rem[idx][team.id];
          let share;
          if (ei === eligible.length - 1) {
            share = availCap - allocated; // last gets remainder
          } else {
            share = Math.round(availCap * need / totalNeed * 100) / 100;
          }
          const spent = allocate(month, idx, team.id, Math.min(share, need));
          allocated += spent;
        });
      }
    });

    // Mark completions
    for (let i = 0; i < N; i++) {
      if (msEnd[i] === -1 && isMsDone(i)) msEnd[i] = month;
    }
  }

  // Handle zero-effort milestones and unfinished ones
  for (let i = 0; i < N; i++) {
    const totalEffort = state.teams.reduce((s, t) => s + (state.rows[i].efforts[t.id] || 0), 0);
    if (totalEffort === 0) {
      // Zero effort: place right after previous milestone of same project
      for (const proj of order) {
        const ms = projects[proj];
        const mi = ms.findIndex(m => m.idx === i);
        if (mi === -1) continue;
        if (mi === 0) { msStart[i] = 0; msEnd[i] = 0; }
        else { const pe = msEnd[ms[mi-1].idx]; msStart[i] = pe >= 0 ? pe : 0; msEnd[i] = msStart[i]; }
        break;
      }
    }
    if (msStart[i] === -1) msStart[i] = 0;
    if (msEnd[i] === -1) msEnd[i] = MAX - 1;
  }

  state.msStart = msStart;
  state.msEnd = msEnd;
  state.usedCapacity = used;
  renderGantt();
  saveState();
  toast(L('toastScheduled'));
}

// ═══════════════════════════════════════════════════════
//  Gantt — multi-month bars
// ═══════════════════════════════════════════════════════
function renderGantt() {
  if (!state.msStart) return;
  document.getElementById('ganttPanel').style.display = '';

  const maxM = Math.max(...state.msEnd) + 1;
  const num  = Math.max(maxM, 6);
  const mo   = L('months');
  const CW = 80; // cell width

  const pc = {}; let ci = 0;
  state.rows.forEach(r => { if (!pc.hasOwnProperty(r.project)) { pc[r.project] = ci % 8; ci++; } });

  let html = '<div class="gantt-header">';
  for (let m = 0; m < num; m++) {
    const mi = (state.startMonth+m) % 12;
    const yr = state.startYear + Math.floor((state.startMonth+m)/12);
    html += `<div class="gantt-month">${mo[mi]} ${String(yr).slice(2)}</div>`;
  }
  html += '</div>';

  state.rows.forEach((row, i) => {
    const s = state.msStart[i], e = state.msEnd[i];
    const totalPT = state.teams.reduce((sum, t) => sum + (row.efforts[t.id]||0), 0);
    const left = s * CW + 4;
    const width = Math.max((e - s + 1) * CW - 8, 20);
    const dur = e - s + 1;

    html += `<div class="gantt-row"><div class="gantt-label"><span class="proj-tag">${esc(row.project)}</span>${esc(row.milestone)}</div><div class="gantt-bars">`;
    for (let j = 0; j < num; j++) html += '<div class="gantt-cell"></div>';
    html += `<div class="gantt-bar" style="background:${GANTT_COLORS[pc[row.project]]};left:${left}px;width:${width}px;">${totalPT > 0 ? totalPT+'PT · '+dur+'M' : ''}</div>`;
    html += '</div></div>';
  });

  document.getElementById('ganttChart').innerHTML = html;
  renderCapOverview(num);
  renderWarnings(num);
  document.getElementById('schedInfo').textContent = L('schedInfo')(num, Object.keys(pc).length, state.strategy);
}

function renderCapOverview(num) {
  const mo = L('months');
  let html = `<h3 style="font-family:var(--mono);font-size:11px;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;">${L('capUtilTitle')}</h3>`;
  state.teams.forEach(team => {
    html += `<div class="cap-row"><div class="cap-row-label"><div class="cap-badge" style="background:${team.color};width:22px;height:22px;font-size:10px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-family:var(--mono);font-weight:700;">&nbsp;</div> ${esc(team.name)}</div><div class="cap-cells">`;
    for (let m = 0; m < num; m++) {
      const u = (state.usedCapacity && state.usedCapacity[m] && state.usedCapacity[m][team.id]) || 0;
      const cap = team.capacity;
      const pct = cap > 0 ? Math.round(u/cap*100) : 0;
      const w = Math.min(pct, 100);
      const over = pct > 100;
      html += `<div class="cap-cell" title="${esc(team.name)}: ${Math.round(u*10)/10}/${cap} PT (${pct}%)"><div class="cap-fill${over?' over':''}" style="width:${w}%;background:${over?'var(--red)':team.color};">${pct>30?`<span class="cap-pct">${pct}%</span>`:''}</div></div>`;
    }
    html += '</div></div>';
  });
  document.getElementById('capOverview').innerHTML = html;
}

function renderWarnings(num) {
  const mo = L('months'), w = [];

  // Capacity warnings
  for (let m = 0; m < num; m++) {
    state.teams.forEach(team => {
      const u = (state.usedCapacity && state.usedCapacity[m] && state.usedCapacity[m][team.id]) || 0;
      const cap = team.capacity;
      const mi = (state.startMonth+m)%12;
      const yr = state.startYear + Math.floor((state.startMonth+m)/12);
      if (u > cap + 0.01) w.push({type:'over', text: L('warnOver')(team.name, `${mo[mi]} ${yr}`, Math.round(u), cap, Math.round(u/cap*100))});
    });
  }

  // Project finish info
  const projects = {};
  state.rows.forEach((r,i) => { if (!projects[r.project]) projects[r.project] = []; projects[r.project].push(i); });
  Object.entries(projects).forEach(([proj, indices]) => {
    const lastEnd = Math.max(...indices.map(i => state.msEnd[i]));
    const mi = (state.startMonth+lastEnd)%12;
    const yr = state.startYear + Math.floor((state.startMonth+lastEnd)/12);
    w.push({type:'info', text: L('warnFinish')(proj, `${mo[mi]} ${yr}`)});
  });

  if (w.filter(x=>x.type==='over').length === 0) {
    w.unshift({type:'ok', text: L('warnOk')});
  }

  document.getElementById('warnPanel').style.display = '';
  document.getElementById('warnings').innerHTML = w.map(x => `<li class="${x.type}">${x.text}</li>`).join('');
}

function clearAll() {

  renderTable(); hideSchedule(); saveState(); toast(L('toastCleared'));
}

// ═══════════════════════════════════════════════════════
//  Modals, Toast, Init
// ═══════════════════════════════════════════════════════
function openModal(type) {
  const id = type === 'impressum' ? 'modalImpressum' : 'modalDatenschutz';
  document.getElementById(id+'Content').innerHTML = '<button class="modal-close" onclick="closeModal(\''+id+'\')">×</button>' + legalContent[type][state.lang];
  document.getElementById(id).classList.add('open');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key==='Escape') document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open')); });

function toast(msg) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500); }

(function init() {
  const loaded = loadState();
  renderAll();
  document.getElementById('startMonth').addEventListener('change', function() { state.startMonth=parseInt(this.value); if(state.msStart)runScheduler(); });
  document.getElementById('startYear').addEventListener('change', function() { state.startYear=parseInt(this.value)||2026; if(state.msStart)runScheduler(); });
  document.getElementById('startMonth').value = state.startMonth;
  document.getElementById('startYear').value  = state.startYear;
  if (loaded && state.msStart) renderGantt();
})();
</script>
