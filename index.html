<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projekt-Scheduler</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <div id="appHeader"></div>
  <div id="appDisclaimer"></div>
  <div id="planningBar"></div>
  <div id="appToolbar"></div>
  <div class="panels">
    <div class="panel">
      <div class="panel-header">
        <h2 id="panelCapTitle"></h2>
        <div class="settings-row">
          <label><span id="lblStart"></span><select id="startMonth"></select></label>
          <label><span id="lblYear"></span><input type="number" id="startYear" value="2026" style="width:70px"></label>
        </div>
      </div>
      <div class="panel-body">
        <div class="capacity-grid" id="capacityGrid"></div>
        <div id="capMonthlyGrid" style="margin-top:16px;"></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <h2 id="panelDataTitle"></h2>
        <span style="font-size:11px;color:var(--text2);font-family:var(--mono)" id="rowCount"></span>
      </div>
      <div class="panel-body">
        <div class="table-wrap">
          <table><thead><tr id="tableHead"></tr></thead><tbody id="dataBody"></tbody></table>
          <div class="empty-state" id="emptyState"></div>
        </div>
      </div>
    </div>
    <div class="panel" id="ganttPanel" style="display:none">
      <div class="panel-header">
        <h2 id="panelGanttTitle"></h2>
        <span style="font-size:11px;color:var(--text2);font-family:var(--mono)" id="schedInfo"></span>
      </div>
      <div class="panel-body">
        <div class="gantt-container"><div class="gantt" id="ganttChart"></div><div class="capacity-overview" id="capOverview"></div></div>
      </div>
    </div>
    <div class="panel" id="warnPanel" style="display:none">
      <div class="panel-header"><h2 id="panelAnalysisTitle"></h2></div>
      <div class="panel-body"><ul class="warning-list" id="warnings"></ul></div>
    </div>
  </div>
  <footer id="appFooter"></footer>
</div>

<div class="modal-overlay" id="modalImpressum" onclick="if(event.target===this)closeModal('modalImpressum')">
  <div class="modal" id="modalImpressumContent"></div>
</div>
<div class="modal-overlay" id="modalDatenschutz" onclick="if(event.target===this)closeModal('modalDatenschutz')">
  <div class="modal" id="modalDatenschutzContent"></div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="csvInput" accept=".csv" onchange="importCSV(event)">

<script src="app.js"></script>
</body>
</html>
